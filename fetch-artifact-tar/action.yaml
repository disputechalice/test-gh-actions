name: Fetch artifact tar

inputs:
  name:
    description: "Artifact name"
    required: true
  prefix:
    description: "Prefix inside archive"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Download archive
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.name }}
        path: .
    - name: Extract (prefixed) payload
      env:
        NAME: ${{ inputs.name }}
        PREFIX: ${{ inputs.prefix }}
      shell: bash
      run: |
        declare -a tar_args=()

        if [[ -n "$PREFIX" ]]; then
          PREFIX=${PREFIX#/}
          PREFIX=${PREFIX%/}
          IFS='/' read -r -a parts <<< "$PREFIX"
          tar_args+=(--strip-components=${#parts[@]} "$PREFIX")
        fi

        test ! -e  "$NAME"
        mkdir -p "$NAME"

        tar -x -C "$NAME" -f "$NAME.tar" "${tar_args[@]}"
