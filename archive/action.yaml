name: Archive artifact
description: >
  Create deterministic tarball, upload as artifact (default)

inputs:
  path:
    description: "Path to archive"
    required: true
  name-prefix:
    description: "Prefix for filename (optional)"
    required: false
    default: "source"
  mtime:
    description: "Timestamp as epoch seconds (optional)"
    required: false
    default: ''
  upload:
    description: "Upload archive as artifact (default)"
    required: false
    default: "true"

outputs:
  name:
    value: ${{ steps.archive.outputs.name }}
  path:
    value: ${{ steps.archive.outputs.path }}
  checksum:
    value: ${{ steps.archive.outputs.checksum }}

runs:
  using: composite
  steps:
    - id: archive
      name: Create canonical tarball
      shell: bash
      env:
        TARGET: ${{ inputs.path }}
        NAME: ${{ inputs.name }}
        MTIME: ${{ inputs.mtime }}
      run: |
        test -d "$TARGET"
        [[ -z "$NAME" || "$NAME" =~ ^[a-zA-Z0-9._-]+$ ]]

        TAR=$(mktemp /tmp/"${NAME:-archive}".XXXXXX.tar)
        MTIME="${MTIME:-$(date +%s)}"

        tar -C "$TARGET" \
          --format=gnu \
          --sort=name \
          --owner=0 \
          --group=0 \
          --numeric-owner \
          --mtime="@$MTIME" \
          -cf "$TAR" .

        read -r TAR_SHA256 _ < <(sha256sum "$TAR")

        >&2 echo "-- OUTPUT"
        >&2 tee -a "$GITHUB_OUTPUT" << EOF
        path=$TAR
        name=${TAR##*/}
        checksum=$TAR_SHA256
        EOF

    - name: Upload artifact
      if: ${{ inputs.upload == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.archive.outputs.path }}
        # single-file artifact - name = filename
        archive: false
        include-hidden-files: true
        retention-days: 1
