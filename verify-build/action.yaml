name: Verify build - plain
description: >
  Run build inside container, verify integrity & expected checksum

inputs:
  builder-image:
    description: Container image to run the build in
    required: true
  build-script:
    description: Script to run the package build
    required: true
  source-dir:
    description: Source directory on host
    required: true
  context:
    required: true
    description: "Context JSON"

outputs:
  status:
    value: ${{ steps.verify.outputs.status }}

runs:
  using: composite
  steps:
    - id: build
      shell: bash
      env:
        BUILDER: ${{ inputs.builder-image }}
        BUILD: "${{ github.action_path }}/${{ inputs.build-script }}"
        SRCDIR: ${{ inputs.source-dir }}
        DEB_PACKAGE: ${{ fromJson(inputs.context).deb.package }}
        SOURCE_DATE_EPOCH: ${{ fromJson(inputs.context).env.source_date_epoch }}
        DPKG_DEB_COMPRESSOR_TYPE: ${{ fromJson(inputs.context).env.dpkg_deb_compressor_type }}
      run: |
        : "${BUILDER:?} ${BUILD:?} ${SRCDIR:?} ${DEB_PACKAGE:?}"
        : "${SOURCE_DATE_EPOCH:?} ${DPKG_DEB_COMPRESSOR_TYPE:?}"

        DEBDIR="$SRCDIR/$DEB_PACKAGE"
        OUTDIR="$(mktemp -d --tmpdir podman-run-out.XXXXXX)"

        podman run --rm \
          --userns=keep-id \
          --network=none \
          -v "$DEBDIR":/mnt/src/deb:ro \
          -v "$OUTDIR":/mnt/out \
          -v "$BUILD":/mnt/build:ro \
          -e SOURCE_DATE_EPOCH \
          -e DPKG_DEB_COMPRESSOR_TYPE \
          "$BUILDER" \
          /mnt/build "/mnt/src/deb" "/mnt/out/built.deb"
        
        >&2 tee -a "$GITHUB_OUTPUT" << EOF
        built-deb=$OUTDIR/built.deb
        EOF

    - id: verify
      shell: bash
      env:
        BUILT_DEB: ${{ steps.build.outputs.built-deb }}
        PACKAGE: ${{ fromJson(inputs.context).deb.package }}
        VERSION: ${{ fromJson(inputs.context).deb.version }}
        SHA256: ${{ fromJson(inputs.context).deb.sha256 }}
      run: |
        test -f "$BUILT_DEB"

        echo "::group::contents"
        dpkg-deb --contents "$BUILT_DEB"
        echo "::endgroup::"

        : "${PACKAGE:?} ${VERSION:?} ${SHA256:?}"

        built="$(dpkg-deb --show --showformat='${Package}|${Version}' "$BUILT_DEB")"
        [[ "$built" == "$PACKAGE|$VERSION" ]]

        sha256sum --check <<< "$SHA256  $BUILT_DEB"

        >&2 tee -a "$GITHUB_OUTPUT" << EOF
        status=pass
        EOF
