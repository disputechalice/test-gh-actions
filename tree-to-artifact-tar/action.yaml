name: Create canonical tar from tree, upload as artifact (optional)
description: Create deterministic tarball

inputs:
  path:
    description: "Directory to archive"
    required: true

  name:
    description: "Prefix for .tar filename (optional)"
    required: false
    default: "source"

  epoch:
    description: "Timestamp as epoch seconds"
    required: true

  upload:
    required: false
    default: "false"
    description: "Upload as artifact"

outputs:
  tar-path:
    value: ${{ steps.archive.outputs.tar-path }}

  tar-sha256:
    value: ${{ steps.archive.outputs.tar-sha256 }}

runs:
  using: composite
  steps:
    - id: archive
      name: Create canonical tarball
      shell: bash
      env:
        TARGET: ${{ inputs.path }}
        NAME: ${{ inputs.name }}
        EPOCH: ${{ inputs.epoch }}
      run: |
        test -d "$TARGET"
        [[ -z "$NAME" || "$NAME" =~ ^[a-zA-Z0-9._-]+$ ]]

        TAR=$(mktemp /tmp/"${NAME:-source}".XXXXXX.tar)

        tar -C "$TARGET" \
          --format=gnu \
          --sort=name \
          --owner=0 \
          --group=0 \
          --numeric-owner \
          --mtime="@$EPOCH" \
          --clamp-mtime \
          -cf "$TAR" .

        read -r TAR_SHA256 _ < <(sha256sum "$TAR")

        tee -a "$GITHUB_OUTPUT" >&2 << EOF
        tar-path=$TAR
        tar-sha256=$TAR_SHA256
        EOF

    - name: Upload artifact
      if: ${{ inputs.upload == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ steps.archive.outputs.tar-path }}
        include-hidden-files: true
        retention-days: 1
